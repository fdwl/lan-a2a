run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - durationcheck
    - errname
    - errorlint
    - exportloopref
    - makezero
    - nilerr
    - prealloc
    - wastedassign

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/fdwl/lan-a2a

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
    - path: cmd/
      linters:
        - unparam
