openapi: "3.0.3"
info:
  title: LAN Agent Bus - MCP Tools API
  description: |
    局域网 AI 智能体通信总线 MCP 工具接口。
    每个工具通过 JSON-RPC 2.0 over WebSocket 调用。
  version: "0.1.0"
  contact:
    name: LAN Agent Bus
  license:
    name: MIT

servers:
  - url: ws://localhost:19100/ws
    description: P2P Agent WebSocket
  - url: ws://localhost:19200/ws
    description: Relay Server WebSocket

tags:
  - name: discovery
    description: 节点发现
  - name: connection
    description: 连接管理
  - name: channel
    description: 频道通信
  - name: file
    description: 文件服务
  - name: transfer
    description: 传输管理

paths:
  /ws:
    get:
      summary: WebSocket 连接端点
      description: 所有 MCP 工具通过此 WebSocket 端点通信
      tags: [connection]
      responses:
        "101":
          description: WebSocket 升级成功

components:
  schemas:
    Message:
      type: object
      properties:
        type:
          type: string
          enum: [register, register_ok, ping, pong, text, file_meta, file_data, file_done, query_online, online_list]
        id:
          type: string
        from:
          type: string
        channel_id:
          type: string
        content:
          type: string
        ts:
          type: integer
          format: int64
        filename:
          type: string
        file_size:
          type: integer
          format: int64
        checksum:
          type: string
        chunk_idx:
          type: integer
        total_chunks:
          type: integer
        data:
          type: string
          format: byte

    ToolCall:
      type: object
      required: [name, arguments]
      properties:
        name:
          type: string
        arguments:
          type: object

    ToolResponse:
      type: object
      properties:
        content:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [text]
              text:
                type: string
        isError:
          type: boolean

  tools:
    lan_get_online_agents:
      summary: 获取在线 Agent 列表
      description: 获取当前局域网内所有在线的 AI 节点（合并 mDNS + Relay）
      tags: [discovery]
      input:
        type: object
        properties: {}
      output:
        type: object
        properties:
          agents:
            type: array
            items:
              type: string
          count:
            type: integer

    lan_open_connection:
      summary: 打开连接
      description: 打开到指定 Agent 的 WebSocket 连接。发送消息或文件前必须先调用此工具。
      tags: [connection]
      input:
        type: object
        required: [peer_id]
        properties:
          peer_id:
            type: string
            description: 要连接的 Agent ID
      output:
        type: object
        properties:
          status:
            type: string
            enum: [connected]
          peer_id:
            type: string

    lan_close_connection:
      summary: 关闭连接
      description: 关闭到指定 Agent 的 WebSocket 连接
      tags: [connection]
      input:
        type: object
        required: [peer_id]
        properties:
          peer_id:
            type: string
      output:
        type: object
        properties:
          status:
            type: string
            enum: [disconnected]
          peer_id:
            type: string

    lan_create_channel:
      summary: 创建频道
      description: 创建通信频道并邀请 peer 加入
      tags: [channel]
      input:
        type: object
        required: [channel_name, peer_ids]
        properties:
          channel_name:
            type: string
            description: 频道名称
          peer_ids:
            type: array
            items:
              type: string
            description: 要邀请的 Agent ID 列表
      output:
        type: object
        properties:
          channel_id:
            type: string
          channel_name:
            type: string
          members:
            type: array
            items:
              type: string

    lan_leave_channel:
      summary: 退出频道
      description: 退出通信频道
      tags: [channel]
      input:
        type: object
        required: [channel_id]
        properties:
          channel_id:
            type: string
      output:
        type: object
        properties:
          status:
            type: string
            enum: [left]
          channel_id:
            type: string

    lan_send_message:
      summary: 发送消息
      description: 向频道发送消息。频道内所有成员的连接必须已打开。
      tags: [channel]
      input:
        type: object
        required: [channel_id, message_body]
        properties:
          channel_id:
            type: string
          message_body:
            type: string
            description: 消息内容（文本、JSON 或自定义协议）
      output:
        type: object
        properties:
          status:
            type: string
            enum: [sent]
          channel_id:
            type: string
          recipients:
            type: integer

    lan_share_file:
      summary: 分享文件
      description: 分享本地文件到频道。支持大文件（自动分块并发传输，64KB/chunk，4 并发）。
      tags: [file]
      input:
        type: object
        required: [channel_id, file_path]
        properties:
          channel_id:
            type: string
          file_path:
            type: string
            description: 本地文件路径
      output:
        type: object
        properties:
          status:
            type: string
            enum: [shared]
          channel_id:
            type: string

    lan_share_folder:
      summary: 分享文件夹
      description: 分享整个文件夹到频道。自动检测变化，只传输修改过的文件（增量同步）。
      tags: [file]
      input:
        type: object
        required: [channel_id, folder_path]
        properties:
          channel_id:
            type: string
          folder_path:
            type: string
            description: 本地文件夹路径
      output:
        type: object
        properties:
          status:
            type: string
            enum: [sharing]
          channel_id:
            type: string
          folder:
            type: string

    lan_sync_folder:
      summary: 同步文件夹
      description: 与远程 peer 同步本地文件夹。扫描变化，只发送 diff。
      tags: [file]
      input:
        type: object
        required: [folder_path, peer_id]
        properties:
          folder_path:
            type: string
          peer_id:
            type: string
      output:
        type: object
        properties:
          status:
            type: string
            enum: [syncing]
          folder:
            type: string
          peer_id:
            type: string

    lan_get_transfer_status:
      summary: 查询传输状态
      description: 查询文件传输状态和进度
      tags: [transfer]
      input:
        type: object
        required: [transfer_id]
        properties:
          transfer_id:
            type: string
      output:
        $ref: "#/components/schemas/Transfer"

    lan_list_transfers:
      summary: 列出所有传输
      description: 列出所有活跃的文件传输
      tags: [transfer]
      input:
        type: object
        properties: {}
      output:
        type: object
        properties:
          transfers:
            type: array
            items:
              $ref: "#/components/schemas/Transfer"
          count:
            type: integer

  schemas:
    Transfer:
      type: object
      properties:
        id:
          type: string
        file_path:
          type: string
        file_name:
          type: string
        file_size:
          type: integer
          format: int64
        file_hash:
          type: string
        total_chunks:
          type: integer
        progress:
          type: number
          format: float
          description: 进度百分比 (0-100)
        status:
          type: string
          enum: [pending, running, completed, failed, paused]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
